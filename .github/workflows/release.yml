name: Release

# Push a tag like v0.2.0 to build the static binaries and publish a GitHub Release.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: build static binaries (all supported linux arches)
        run: |
          mkdir -p dist
          V="${GITHUB_REF_NAME#v}"; LD="-s -w -X main.version=$V"
          for arch in amd64 386 arm64 riscv64 ppc64le s390x loong64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-$arch ./cmd/nft-okboy
          done
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-armv7 ./cmd/nft-okboy
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=6 go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-armv6 ./cmd/nft-okboy
          ( cd dist && sha256sum nft-okboy-linux-* > SHA256SUMS )
      - name: publish release with binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/nft-okboy-linux-* dist/SHA256SUMS \
            --title "nft-okboy Fleet ${GITHUB_REF_NAME}" \
            --notes-file .github/release-notes.md --generate-notes
