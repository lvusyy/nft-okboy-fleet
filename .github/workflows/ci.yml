name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: vet + unit tests + cross-build
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: go vet
        run: go vet ./...
      - name: unit tests
        run: go test ./...
      - name: cross-compile check (all supported linux arches)
        run: |
          V="$(cat VERSION)"; LD="-s -w -X main.version=$V"
          for arch in amd64 386 arm64 riscv64 ppc64le s390x loong64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-$arch ./cmd/nft-okboy
          done
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-armv7 ./cmd/nft-okboy
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=6 go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-armv6 ./cmd/nft-okboy
          file dist/nft-okboy-linux-*

  integration-nft:
    name: real nftables integration (isolated netns)
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: ensure nftables present
        run: sudo apt-get update -qq && sudo apt-get install -y nftables
      - name: run nft integration test in a network namespace
        run: |
          go test -tags integration -c -o /tmp/nfttest ./internal/firewall/
          sudo ip netns add okboy_ci
          sudo ip netns exec okboy_ci env PATH=/usr/sbin:/usr/bin:/bin \
            /tmp/nfttest -test.run TestNftIntegration -test.v
          sudo ip netns del okboy_ci

  integration-ufw:
    name: real ufw integration (isolated mount+net ns)
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: ensure ufw present
        run: sudo apt-get update -qq && sudo apt-get install -y ufw
      - name: run ufw integration test in a namespace sandbox
        run: |
          go test -tags integration -c -o /tmp/ufwtest ./internal/firewall/
          sudo bash scripts/ufw-integration.sh /tmp/ufwtest

  e2e:
    name: end-to-end fleet (hub + agent; ufw & nftables)
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: ensure ufw + nftables present
        run: sudo apt-get update -qq && sudo apt-get install -y ufw nftables
      - name: build nft-okboy
        run: CGO_ENABLED=0 go build -o /tmp/nft-okboy ./cmd/nft-okboy
      - name: e2e (agent backend = ufw)
        run: sudo BIN=/tmp/nft-okboy AGENT_BACKEND=ufw bash scripts/e2e-fleet.sh
      - name: e2e (agent backend = nftables)
        run: sudo BIN=/tmp/nft-okboy AGENT_BACKEND=nftables bash scripts/e2e-fleet.sh
