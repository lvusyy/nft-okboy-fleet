name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vet + unit tests + build
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: go vet
        run: go vet ./...
      - name: unit tests
        run: go test ./...
      - name: build amd64 + cross-compile check (all supported linux arches)
        run: |
          V="$(cat VERSION)"; LD="-s -w -X main.version=$V"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64       go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-amd64 ./cmd/okboy
          CGO_ENABLED=0 GOOS=linux GOARCH=386         go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-386 ./cmd/okboy
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64       go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-arm64 ./cmd/okboy
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-armv7 ./cmd/okboy
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=6 go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-armv6 ./cmd/okboy
          CGO_ENABLED=0 GOOS=linux GOARCH=riscv64     go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-riscv64 ./cmd/okboy
          CGO_ENABLED=0 GOOS=linux GOARCH=ppc64le     go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-ppc64le ./cmd/okboy
          CGO_ENABLED=0 GOOS=linux GOARCH=s390x       go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-s390x ./cmd/okboy
          CGO_ENABLED=0 GOOS=linux GOARCH=loong64     go build -trimpath -ldflags "$LD" -o dist/nft-okboy-linux-loong64 ./cmd/okboy
          file dist/nft-okboy-linux-*

  integration:
    name: real nftables integration (isolated netns)
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: ensure nftables present
        run: sudo apt-get update -qq && sudo apt-get install -y nftables
      - name: run nft integration test in a network namespace
        run: |
          go test -tags integration -c -o /tmp/nfttest ./internal/firewall/
          sudo ip netns add okboy_ci
          sudo ip netns exec okboy_ci env PATH=/usr/sbin:/usr/bin:/bin \
            /tmp/nfttest -test.run TestNftIntegration -test.v
          sudo ip netns del okboy_ci
