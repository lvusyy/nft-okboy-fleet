# nginx reverse proxy for okboy. TLS terminates here; the daemon binds
# 127.0.0.1:5000. The X-Real-IP header is what okboy registers in the firewall,
# so it MUST be set from $remote_addr (the real client) and nginx's own IP MUST
# be in okboy's trusted_proxies.

server {
    listen 443 ssl http2;
    server_name your.server.com;

    ssl_certificate     /etc/letsencrypt/live/your.server.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.server.com/privkey.pem;

    # Defense in depth with okboy's own per-IP throttle.
    # limit_req_zone $binary_remote_addr zone=okboy:10m rate=10r/s;  # define in http{}
    # limit_req zone=okboy burst=20 nodelay;

    client_max_body_size 64k;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name your.server.com;
    return 301 https://$host$request_uri;
}
